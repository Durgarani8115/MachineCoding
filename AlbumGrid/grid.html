<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlbumGrid</title>
</head>
<style>
    .container {
        display: grid;
        border: 1px solid black;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        row-gap: 10px;
        column-gap: 10px;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 10px;
        grid-auto-rows: 10px;
    }


    .item {
  background: #4f46e5;
  color: white;
  font-size: 20px;
  border-radius: 10px;

  display: flex;
  justify-content: center;
  align-items: center;
}

.small {
  grid-row: span 10;
}

.medium {
  grid-row: span 15;
}

.large {
  grid-row: span 20;
}
.item-10{
    /* grid-column: span 50;
     */
     grid-row: span 20;
     grid-column: span 3;
}
.item-1{
    grid-column: span 8 ;
    grid-row: span 5;
}
.item-3{
    grid-column: span 3;
    grid-row: span 10;
}
.item-5{
    grid-column: span 2;
    grid-row: span 10;
}
   
</style>

<body>
  <div class="container">
  <div class="item item-1 ">1</div>
  <div class="item large">2</div>
  <div class="item item-3">3</div>
  <div class="item small">4</div>
  <div class="item item-5">5</div>
  <div class="item medium">6</div>
  <div class="item small">7</div>
  <div class="item medium">8</div>
  <div class="item large">9</div>
  <div class="item item-10">10</div>
</div>
</body>

</html>
